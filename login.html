<!DOCTYPE html>
<html>
<head>
<title>PawFind User Registration</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

nav{
background:linear-gradient(90deg,#ff7a59,#ff6a5c);
padding:20px;
color:white;
font-size:24px;
font-weight:bold;
}

.container{
width:500px;
margin:40px auto;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h2{
text-align:center;
margin-bottom:25px;
}

input, select, textarea{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#ff6a5c;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff4d3b;
}

footer{
background:#222;
color:white;
text-align:center;
padding:12px;
margin-top:30px;
}
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup-card{
background:white;
padding:35px;
border-radius:12px;
text-align:center;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:popupScale 0.3s ease;
}

.popup-card h2{
color:#28a745;
margin-bottom:10px;
}

.popup-card p{
font-size:15px;
margin-bottom:20px;
}

.popup-card button{
background:#ff6a5c;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.popup-card button:hover{
background:#ff4a3d;
}

@keyframes popupScale{
from{
transform:scale(0.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

</style>

</head>

<body>

<nav>PawFind 🐾</nav>

<div class="container">

<h2>Create Account</h2>
<form id="registerForm">

<label>Full Name</label>
<input type="text" name="full_name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="text" name="phone" required>

<label>Age</label>
<input type="number" name="age" required>

<label>Gender</label>
<select name="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Occupation</label>
<input type="text" name="occupation">

<label>Address</label>
<textarea name="address"></textarea>

<label>City</label>
<input type="text" name="city">

<label>State</label>
<input type="text" name="state">

<label>Pincode</label>
<input type="text" name="pincode">

<button type="submit">Register</button>

</form>

</div>

<footer>© PawFind</footer>
<script>

const form = document.getElementById("registerForm");

form.addEventListener("submit", async function(e){

e.preventDefault();

const formData = new FormData(form);
const data = Object.fromEntries(formData.entries());

try{

const response = await fetch("http://localhost:3000/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

const result = await response.text();

showPopup("Registration completed successfully 🎉");

form.reset();

}catch(error){

showPopup("Something went wrong. Please try again.");

}

});


function showPopup(message){

document.getElementById("popupMessage").innerText = message;

document.getElementById("successPopup").style.display = "flex";

}

function closePopup(){

document.getElementById("successPopup").style.display = "none";

}

</script>
<div id="successPopup" class="popup">
  <div class="popup-card">
      <h2>🎉 Success!</h2>
      <p id="popupMessage">Your request has been submitted successfully.</p>
      <button onclick="closePopup()">OK</button>
  </div>
</div>
</body>
</html>
